[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
  "src/benchmarks/tpch/tpch-dbgen",
]

[tool.ruff.lint]
# Start with high-signal correctness checks only.
select = ["E9", "F63", "F7", "F82"]
extend-select = ["F401", "F841", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Legacy modules are onboarded incrementally for import ordering and pyupgrade rules.
"src/**/*.py" = ["I001", "UP"]
"tests/**/*.py" = ["I001", "UP"]
"scripts/**/*.py" = ["I001"]

[tool.pytest.ini_options]
# Use importlib import mode so same-basename test modules in different
# directories (e.g. tests/unit/tuners/test_types.py and
# tests/unit/visualization/test_types.py) don't collide under the legacy
# prepend importer. src.* imports still resolve via the repo-root rootdir.
addopts = "--import-mode=importlib"

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
ignore_missing_imports = true
follow_imports = "skip"
warn_unused_ignores = false
warn_redundant_casts = false
exclude = ["src/benchmarks/tpch/tpch-dbgen"]
files = ["src", "scripts"]

[[tool.mypy.overrides]]
module = ["docker", "docker.*", "psycopg2", "psycopg2.*", "psutil"]
ignore_missing_imports = true
