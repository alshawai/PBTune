# Conda environment for PBT PostgreSQL Tuning
#
# Usage:
#   conda env create -f environment.yml
#   conda activate pbt-tuning
#
# This avoids the pyrfr compilation issues by using pre-built
# conda-forge packages.

name: pbt-tuning
channels:
  - conda-forge

dependencies:
  - python=3.13

  # Database
  - psycopg2=2.9
  - sqlalchemy>=2.0

  # Data processing
  - pandas>=2.0
  - numpy>=2.0
  - scipy>=1.14

  # System monitoring
  - psutil>=5.9

  # Environment variables
  - python-dotenv>=1.0

  # Machine learning
  - scikit-learn>=1.5

  # Configuration
  - pyyaml>=6.0

  # Docker SDK
  - docker-py>=7.0

  # Importance analysis — conda-forge has pre-built pyrfr
  - pyrfr>=0.9
  - configspace>=1.1
  - shap>=0.49

  # Bayesian Optimization
  - smac>=2.2

  # Natural breaks (Jenks)
  - jenkspy>=0.4

  # Dev/test (optional — uncomment if needed)
  # - pytest>=8.3
  # - ruff>=0.8
  # - mypy>=1.11
  # - types-requests>=2.32

  # Anything not on conda-forge falls through to pip
  - pip

  - pip:
      - fanova>=2.0.18
      # Dev/test (optional — uncomment if needed)
      # - graphifyy
